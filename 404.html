<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a1020" />
  <title>Page not found &mdash; BadFox Pools LLC</title>
  <meta name="description" content="This pool is empty &mdash; the page you were looking for could not be found." />
  <meta name="robots" content="noindex, follow" />
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <link rel="apple-touch-icon" href="assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap"
    onload="this.onload=null;this.rel='stylesheet'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" />
  </noscript>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .nf-page {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 80px 24px;
      background:
        radial-gradient(60% 50% at 50% 30%, rgba(29,161,242,0.18), transparent 70%),
        radial-gradient(80% 60% at 50% 100%, rgba(109,207,246,0.10), transparent 60%),
        var(--navy);
      position: relative;
      overflow: hidden;
    }

    /* Subtle ambient ripples behind the drop */
    .nf-ripple {
      position: absolute;
      left: 50%; top: 38%;
      width: 320px; height: 320px;
      border: 1px solid rgba(109,207,246,0.18);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: ripple 4.5s var(--ease) infinite;
    }
    .nf-ripple.r2 { animation-delay: 1.4s; }
    .nf-ripple.r3 { animation-delay: 2.8s; }
    @keyframes ripple {
      0%   { width: 120px; height: 120px; opacity: 0.55; }
      100% { width: 720px; height: 720px; opacity: 0; }
    }

    .nf-inner {
      position: relative; z-index: 2;
      text-align: center; max-width: 560px;
    }
    .nf-drop {
      display: block; margin: 0 auto 36px;
      filter: drop-shadow(0 0 30px rgba(29,161,242,0.45));
    }
    .nf-code {
      font-family: var(--font-display);
      font-size: clamp(96px, 16vw, 180px);
      font-weight: 400;
      line-height: 0.95;
      letter-spacing: -0.02em;
      margin: 0 0 8px;
      color: var(--white);
      background: linear-gradient(180deg, var(--white) 0%, var(--accent-2) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .nf-headline {
      font-family: var(--font-display);
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 400;
      line-height: 1.15;
      margin: 0 0 18px;
      color: var(--white);
    }
    .nf-headline em { font-style: italic; color: var(--accent-2); }
    .nf-sub {
      color: var(--silver);
      font-size: 17px;
      line-height: 1.7;
      max-width: 44ch;
      margin: 0 auto 36px;
      font-weight: 300;
    }
    .nf-actions {
      display: inline-flex; gap: 14px; flex-wrap: wrap;
      justify-content: center;
    }
  </style>
</head>
<body>
  <main id="main">
    <section class="nf-page" aria-label="Page not found">
      <span class="nf-ripple" aria-hidden="true"></span>
      <span class="nf-ripple r2" aria-hidden="true"></span>
      <span class="nf-ripple r3" aria-hidden="true"></span>

      <div class="nf-inner">
        <svg class="nf-drop" width="120" height="148" viewBox="0 0 11 13" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="nfDropFill" x1="0" y1="1" x2="0" y2="0">
              <stop offset="0%" stop-color="#1da1f2"/>
              <stop offset="55%" stop-color="#6dcff6"/>
              <stop offset="100%" stop-color="#a7e1ff"/>
            </linearGradient>
            <clipPath id="nfDropClip">
              <path d="M5.5 0C5.5 0 0 6.5 0 10Q1.833 12.5 3.667 10Q5.5 12.5 7.333 10Q9.167 12.5 11 10C11 6.5 5.5 0 5.5 0Z"/>
            </clipPath>
          </defs>
          <path d="M5.5 0C5.5 0 0 6.5 0 10Q1.833 12.5 3.667 10Q5.5 12.5 7.333 10Q9.167 12.5 11 10C11 6.5 5.5 0 5.5 0Z"
                fill="rgba(109,207,246,0.06)"
                stroke="rgba(109,207,246,0.55)" stroke-width="0.18"/>
          <rect x="0" width="11" height="14" fill="url(#nfDropFill)" clip-path="url(#nfDropClip)">
            <animate attributeName="y"
                     values="13;6;13"
                     keyTimes="0;0.5;1"
                     dur="3.4s"
                     repeatCount="indefinite"
                     calcMode="spline"
                     keySplines="0.42 0 0.2 1; 0.42 0 0.2 1"/>
          </rect>
        </svg>

        <h1 class="nf-code">404</h1>
        <p class="nf-headline">This pool is <em>empty</em>.</p>
        <p class="nf-sub">The page you&rsquo;re looking for couldn&rsquo;t be found. Let&rsquo;s get you back to clear water.</p>

        <div class="nf-actions">
          <a class="btn btn-primary" href="/">Back to home</a>
          <a class="btn btn-ghost" href="/#contact">Book Service</a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
